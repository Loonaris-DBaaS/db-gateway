services:
  # postgres-1: postgresql://sk_live_tenant1@localhost:5434/db1
  postgres-1:
    image: postgres:16
    environment:
      POSTGRES_USER: user1
      POSTGRES_PASSWORD: password1
      POSTGRES_DB: db1
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - ./docker/init/init-1.sql:/docker-entrypoint-initdb.d/init.sql

  # postgres-2: postgresql://sk_live_tenant2@localhost:5435/db2
  postgres-2:
    image: postgres:16
    environment:
      POSTGRES_USER: user2
      POSTGRES_PASSWORD: password2
      POSTGRES_DB: db2
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5435:5432"
    volumes:
      - ./docker/init/init-2.sql:/docker-entrypoint-initdb.d/init.sql

  # postgres-3: postgresql://sk_live_tenant3@localhost:5436/db3
  postgres-3:
    image: postgres:16
    environment:
      POSTGRES_USER: user3
      POSTGRES_PASSWORD: password3
      POSTGRES_DB: db3
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5436:5432"
    volumes:
      - ./docker/init/init-3.sql:/docker-entrypoint-initdb.d/init.sql
